<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
    <title>Libre Tentación - Sin TACC</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c9a84c;
            --crema: #fdfaf4;
            --dark: #2d2d2d;
        }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: var(--crema);
            color: var(--dark);
        }

        /* --- PANTALLA DE ENTRADA --- */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--crema);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999;
        }
        .logo-box {
            width: 150px; height: 150px; border-radius: 50%;
            border: 2px solid var(--gold); overflow: hidden; margin-bottom: 20px;
            background: white;
        }
        .logo-box img { width: 100%; height: 100%; object-fit: cover; }
        .btn-entrar {
            background: var(--gold); color: white; border: none;
            padding: 15px 40px; border-radius: 30px; font-weight: 600;
            text-transform: uppercase; letter-spacing: 2px; cursor: pointer;
        }

        /* --- CONTENIDO --- */
        header {
            background: white; padding: 15px; text-align: center;
            border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100;
        }
        header h1 { margin: 0; font-size: 20px; color: var(--gold); }

        .container { padding: 20px; padding-bottom: 100px; }

        /* --- CATEGORIAS --- */
        .categoria-btn {
            width: 100%; background: white; border: 1px solid #eee;
            padding: 20px; border-radius: 15px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center;
            font-family: 'Montserrat', sans-serif; font-weight: 600; font-size: 16px;
        }
        .categoria-btn.active { background: var(--gold); color: white; }
        
        .lista-productos { display: none; padding: 10px 0; }

        /* --- PRODUCTO --- */
        .producto {
            display: flex; align-items: center; background: white;
            padding: 10px; border-radius: 15px; margin-bottom: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }
        .producto img {
            width: 70px; height: 70px; border-radius: 12px;
            object-fit: cover; margin-right: 15px; background: #f9f9f9;
        }
        .info { flex: 1; }
        .info h3 { margin: 0; font-size: 14px; font-weight: 400; font-style: italic; }
        .info p { margin: 5px 0 0; color: var(--gold); font-weight: 700; }
        
        .btn-pedir {
            background: #25d366; color: white; border: none;
            padding: 8px 12px; border-radius: 10px; font-size: 12px;
        }

        /* BARRA INFERIOR */
        .nav-bottom {
            position: fixed; bottom: 0; width: 100%; background: white;
            display: flex; justify-content: space-around; padding: 15px 0;
            border-top: 1px solid #eee;
        }
        .nav-bottom a { text-decoration: none; color: #888; font-size: 12px; text-align: center; }
    </style>
</head>
<body>

    <div id="splash">
        <div class="logo-box"><img src="logo.png" onerror="this.src='https://via.placeholder.com/150?text=Libre+Tentacion'"></div>
        <button class="btn-entrar" onclick="entrar()">Entrar al Catálogo</button>
    </div>

    <header>
        <h1>Libre Tentación</h1>
        <small style="letter-spacing: 2px;">SIN TACC • PAYSANDÚ</small>
    </header>

    <div class="container">
        
        <button class="categoria-btn" onclick="toggleCat('dulces', this)">Dulces Tentaciones <span>▾</span></button>
        <div id="dulces" class="lista-productos">
            <div class="producto">
                <img src="alfajores2.png">
                <div class="info"><h3>Alfajores de Maicena</h3><p>$ 120</p></div>
                <button class="btn-pedir" onclick="pedir('Alfajores de Maicena')">Pedir</button>
            </div>
            <div class="producto">
                <img src="brownie.png">
                <div class="info"><h3>Brownie</h3><p>$ 600</p></div>
                <button class="btn-pedir" onclick="pedir('Brownie')">Pedir</button>
            </div>
            <div class="producto">
                <img src="muffinsclásicos.png">
                <div class="info"><h3>Muffin Clásico</h3><p>$ 80</p></div>
                <button class="btn-pedir" onclick="pedir('Muffin Clásico')">Pedir</button>
            </div>
        </div>

        <button class="categoria-btn" onclick="toggleCat('salados', this)">Opciones Saladas <span>▾</span></button>
        <div id="salados" class="lista-productos">
            <div class="producto">
                <img src="empanadas.png">
                <div class="info"><h3>Docena Empanadas</h3>
